services:

  postgres:
    image: postgres:15
    container_name: randomizer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:${DB_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:                       
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      retries: 5

  bot:
    image: alina1234567a/petushok_bot:ver1
    build: .
    container_name: randomizer_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy     

volumes:
  postgres_data: